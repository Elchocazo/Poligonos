<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explorador de Polígonos Colectivo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            touch-action: none;
            overflow: hidden;
        }
        .canvas-container {
            position: relative;
            cursor: crosshair;
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 30px 30px;
        }
        .score-badge {
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
    </style>
</head>
<body class="bg-slate-100 font-sans min-h-screen flex flex-col">

    <!-- Encabezado con Nota -->
    <header class="bg-indigo-600 text-white p-4 shadow-lg flex justify-between items-center px-8">
        <div>
            <h1 class="text-2xl font-bold">🎨 Mi Gran Plano de Polígonos</h1>
            <p class="text-xs opacity-90 text-left">Crea muchas figuras sin borrar las anteriores</p>
        </div>
        <div class="bg-white/20 p-2 rounded-xl text-center min-w-[120px]">
            <span class="text-xs uppercase font-bold block">Tu Nota:</span>
            <span id="grade-display" class="text-3xl font-black">0.0</span>
        </div>
    </header>

    <!-- Área Principal -->
    <main class="flex-grow flex flex-col md:flex-row p-4 gap-4 overflow-hidden">
        
        <!-- Controles y Progreso -->
        <div class="w-full md:w-80 bg-white rounded-2xl shadow-md p-6 flex flex-col gap-4 overflow-y-auto">
            <div class="bg-blue-50 p-4 rounded-xl border border-blue-200">
                <div class="flex justify-between items-end mb-1">
                    <span class="text-xs font-bold text-blue-600 uppercase">Progreso del Álbum</span>
                    <span id="album-count" class="text-sm font-bold text-blue-700">0 / 20</span>
                </div>
                <div class="w-full bg-blue-200 rounded-full h-4">
                    <div id="progress-bar" class="bg-blue-600 h-4 rounded-full transition-all duration-500" style="width: 0%"></div>
                </div>
                <p class="text-[10px] text-blue-500 mt-2 text-center">¡Llega a 20 para sacar 5.0!</p>
            </div>

            <div class="bg-yellow-50 p-3 rounded-lg border-2 border-yellow-200 text-xs text-yellow-800">
                <strong>¿Sabías que?</strong> Un polígono <b>Irregular</b> tiene lados o ángulos diferentes. ¡Son figuras únicas!
            </div>

            <button id="btn-check" class="bg-green-500 hover:bg-green-600 text-white font-bold py-4 rounded-xl shadow-lg transition-all transform active:scale-95 flex flex-col items-center">
                <span class="text-xl">🖌️ ¡Echar Pintura!</span>
                <span class="text-[10px] opacity-80">(Solo a la figura actual)</span>
            </button>

            <button id="btn-clear-current" class="text-gray-500 border border-gray-300 hover:bg-gray-100 font-bold py-2 rounded-xl text-xs transition-all">
                Reiniciar figura actual
            </button>

            <div class="mt-4">
                <h3 class="text-xs font-bold text-gray-400 uppercase mb-2">Últimos Polígonos:</h3>
                <div id="polygons-list" class="flex flex-wrap gap-2">
                    <!-- Lista de nombres de polígonos creados -->
                </div>
            </div>

            <button id="btn-reset-all" class="mt-auto text-red-400 hover:text-red-600 text-[10px] font-bold uppercase tracking-wider">
                Borrar todo el plano
            </button>
        </div>

        <!-- Lienzo (Canvas) -->
        <div class="flex-grow bg-white rounded-2xl shadow-inner border-4 border-dashed border-slate-200 canvas-container overflow-hidden" id="canvas-wrapper">
            <canvas id="polygonCanvas"></canvas>
            
            <!-- Overlay de información -->
            <div id="feedback-overlay" class="absolute inset-0 pointer-events-none flex items-center justify-center transition-opacity duration-500 opacity-0 z-20">
                <div id="feedback-message" class="bg-white/95 p-8 rounded-3xl shadow-2xl text-center max-w-md border-8"></div>
            </div>
            
            <!-- Indicador de puntos actuales -->
            <div id="current-info" class="absolute bottom-4 right-4 bg-white/80 backdrop-blur-sm px-4 py-2 rounded-full text-xs font-bold border shadow-sm">
                Puntos en mano: <span id="current-points-count">0</span>
            </div>
        </div>
    </main>

    <script>
        const canvas = document.getElementById('polygonCanvas');
        const ctx = canvas.getContext('2d');
        const wrapper = document.getElementById('canvas-wrapper');
        const btnCheck = document.getElementById('btn-check');
        const btnClearCurrent = document.getElementById('btn-clear-current');
        const btnResetAll = document.getElementById('btn-reset-all');
        const feedbackOverlay = document.getElementById('feedback-overlay');
        const feedbackMessage = document.getElementById('feedback-message');
        const albumCount = document.getElementById('album-count');
        const progressBar = document.getElementById('progress-bar');
        const gradeDisplay = document.getElementById('grade-display');
        const polygonsList = document.getElementById('polygons-list');
        const currentPointsCount = document.getElementById('current-points-count');

        // Estado del App
        let completedPolygons = []; // [{points: [], name: "", color: ""}]
        let currentPoints = [];
        let isCurrentClosed = false;
        const CLOSE_DISTANCE = 25;
        const TARGET_GOAL = 20;

        const polygonNames = {
            3: "Triángulo", 4: "Cuadrilátero", 5: "Pentágono", 
            6: "Hexágono", 7: "Heptágono", 8: "Octágono", 
            9: "Eneágono", 10: "Decágono"
        };

        const colors = ['#818cf8', '#fb923c', '#4ade80', '#f472b6', '#2dd4bf', '#fbbf24', '#a78bfa'];

        function getPolygonName(sides) {
            return polygonNames[sides] || `Polígono de ${sides} lados`;
        }

        function resize() {
            canvas.width = wrapper.clientWidth;
            canvas.height = wrapper.clientHeight;
            draw();
        }

        window.addEventListener('resize', resize);
        resize();

        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            // Intentar cerrar
            if (currentPoints.length > 2) {
                const start = currentPoints[0];
                const dist = Math.hypot(x - start.x, y - start.y);
                if (dist < CLOSE_DISTANCE) {
                    isCurrentClosed = true;
                    draw();
                    return;
                }
            }

            if (!isCurrentClosed) {
                currentPoints.push({ x, y });
                currentPointsCount.innerText = currentPoints.length;
                draw();
            }
        });

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. Dibujar polígonos ya completados
            completedPolygons.forEach(poly => {
                ctx.beginPath();
                ctx.lineWidth = 4;
                ctx.strokeStyle = '#334155';
                ctx.fillStyle = poly.color;
                ctx.moveTo(poly.points[0].x, poly.points[0].y);
                poly.points.forEach(p => ctx.lineTo(p.x, p.y));
                ctx.closePath();
                ctx.fill();
                ctx.stroke();

                // Nombre pequeño en el centro del polígono
                const centerX = poly.points.reduce((s, p) => s + p.x, 0) / poly.points.length;
                const centerY = poly.points.reduce((s, p) => s + p.y, 0) / poly.points.length;
                ctx.fillStyle = "#1e293b";
                ctx.font = "bold 12px sans-serif";
                ctx.textAlign = "center";
                ctx.fillText(poly.name, centerX, centerY);
            });

            // 2. Dibujar figura en construcción
            if (currentPoints.length > 0) {
                ctx.beginPath();
                ctx.lineWidth = 5;
                ctx.setLineDash([5, 5]); // Línea punteada para lo que no es polígono aún
                ctx.strokeStyle = '#6366f1';
                ctx.moveTo(currentPoints[0].x, currentPoints[0].y);
                currentPoints.forEach(p => ctx.lineTo(p.x, p.y));
                
                if (isCurrentClosed) {
                    ctx.closePath();
                    ctx.setLineDash([]);
                    ctx.stroke();
                } else {
                    ctx.stroke();
                    ctx.setLineDash([]);
                }

                // Puntos
                currentPoints.forEach((p, i) => {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, (i === 0 && currentPoints.length > 2 && !isCurrentClosed) ? 12 : 6, 0, Math.PI * 2);
                    ctx.fillStyle = (i === 0 && currentPoints.length > 2 && !isCurrentClosed) ? '#f43f5e' : '#6366f1';
                    ctx.fill();
                    ctx.strokeStyle = 'white';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                });
            }
        }

        btnCheck.addEventListener('click', () => {
            if (currentPoints.length < 3) {
                showMessage("🤔 ¡Faltan puntos! Un polígono necesita al menos 3.", "warning");
                return;
            }

            if (isCurrentClosed) {
                // Guardar polígono
                const name = getPolygonName(currentPoints.length);
                const randomColor = colors[completedPolygons.length % colors.length];
                
                completedPolygons.push({
                    points: [...currentPoints],
                    name: name,
                    color: randomColor
                });

                // Actualizar UI
                addToList(name, randomColor);
                updateProgress();
                
                // Reiniciar actual
                currentPoints = [];
                isCurrentClosed = false;
                currentPointsCount.innerText = "0";
                draw();

                showMessage(`✨ ¡Excelente!<br>Has creado un <b>${name} Irregular</b>.<br>¡Sigue así!`, "success");
            } else {
                spillPaint();
            }
        });

        function spillPaint() {
            canvas.style.backgroundColor = '#fee2e2';
            showMessage("💧 ¡Pintura derramada!<br><br>Recuerda que para ser un <b>Polígono</b> la línea debe estar cerrada.", "error");
            setTimeout(() => canvas.style.backgroundColor = 'white', 1500);
        }

        function updateProgress() {
            const count = Math.min(completedPolygons.length, TARGET_GOAL);
            albumCount.innerText = `${count} / ${TARGET_GOAL}`;
            
            const percentage = (count / TARGET_GOAL) * 100;
            progressBar.style.width = `${percentage}%`;

            // Calcular nota (Máximo 5.0)
            const grade = (count / TARGET_GOAL) * 5;
            gradeDisplay.innerText = grade.toFixed(1);

            if (count === TARGET_GOAL) {
                gradeDisplay.classList.add('text-green-500');
                showMessage("🏆 ¡FELICIDADES!<br>Has completado tu álbum con 20 polígonos.<br>Tu nota es 5.0", "success");
            }
        }

        function addToList(name, color) {
            const badge = document.createElement('div');
            badge.className = "px-2 py-1 rounded text-[10px] font-bold text-white score-badge";
            badge.style.backgroundColor = color;
            badge.innerText = name;
            polygonsList.prepend(badge);
        }

        function showMessage(htmlMsg, type) {
            feedbackMessage.innerHTML = htmlMsg;
            let colors = "bg-white border-yellow-400 text-yellow-800";
            if (type === "success") colors = "bg-green-50 border-green-500 text-green-800";
            if (type === "error") colors = "bg-red-50 border-red-500 text-red-800";

            feedbackMessage.className = `p-8 rounded-3xl border-8 shadow-2xl text-xl font-bold ${colors}`;
            feedbackOverlay.style.opacity = "1";
            feedbackOverlay.style.pointerEvents = "auto";
            setTimeout(() => {
                feedbackOverlay.style.opacity = "0";
                feedbackOverlay.style.pointerEvents = "none";
            }, 3000);
        }

        btnClearCurrent.addEventListener('click', () => {
            currentPoints = [];
            isCurrentClosed = false;
            currentPointsCount.innerText = "0";
            draw();
        });

        btnResetAll.addEventListener('click', () => {
            if(confirm("¿Seguro que quieres borrar todas tus figuras y tu nota?")) {
                completedPolygons = [];
                currentPoints = [];
                isCurrentClosed = false;
                polygonsList.innerHTML = "";
                updateProgress();
                draw();
            }
        });

    </script>
</body>
</html>
